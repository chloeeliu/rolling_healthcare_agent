infection_only_monitoring_guideline:
  task:
    name: "rolling_infection_only_monitoring"
    objective: "At each checkpoint, decide whether suspected infection is already visible."
    labels:
      - "keep_monitoring"
      - "infection_suspect"

  rule:
    summary: "Use only the official antibiotic-culture overlap timing logic."
    keep_monitoring: "No visible overlap pair yet."
    infection_suspect: "At least one visible overlap pair exists."

  official_logic:
    antibiotic_source: "mimiciv_hosp.prescriptions.starttime"
    culture_source: "COALESCE(mimiciv_hosp.microbiologyevents.charttime, CAST(chartdate AS TIMESTAMP))"
    antibiotic_first: "antibiotic_time < culture_time AND culture_time <= antibiotic_time + 24h"
    culture_first: "culture_time <= antibiotic_time AND antibiotic_time <= culture_time + 72h"
    suspicion_time: "culture_time when culture comes first, otherwise antibiotic_time"

  use:
    - "Use culture order time only."
    - "Use same-admission data only."
    - "Use only events visible by the current checkpoint."
    - "Focus on prescriptions and microbiology events."

  do_not_use:
    - "Do not require positive cultures."
    - "Do not use organism identity."
    - "Do not use culture result status."
    - "Do not add SOFA or other organ dysfunction logic."
    - "Do not use mimiciv_derived tables in the raw baseline."
